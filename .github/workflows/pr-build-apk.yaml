name: Pull Request - Build APK

on:
  pull_request:
    types: [ labeled ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.label.name == 'Status - Ready 4 test' }}
    timeout-minutes: 15
    env:
      VERSION_SUFFIX: ${{ format('PR{0}', github.event.pull_request.number) }}
      KEYSTORE: ${{ secrets.KEYSTORE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Android Environment
        uses: ./.github/actions/setup-android

      - name: Build APK - STG
        run: ./gradlew app:assembleStagingRelease --no-daemon

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: app-staging-release
          path: app/build/outputs/apk/staging/release/app-staging-release.apk

  deploy-firebase:
    needs: build
    runs-on: codebuild-workflow-${{ github.run_id }}-${{ github.run_attempt }}
    container:
      image: ruby:3.4.5-bookworm
    timeout-minutes: 15
    env:
      GOOGLE_PLAY_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}

    steps:
      - name: Set up Node.js
        run: |
          curl -fsSL https://deb.nodesource.com/setup_24.x | bash -
          apt-get install -y nodejs

      - uses: actions/checkout@v6

      - name: Download artifact
        uses: actions/download-artifact@v6
        with:
          name: app-staging-release

      - name: Bundle install
        run: bundle install

      - name: Upload to Firebase App Distribution
        run: |
          bundle exec fastlane publish_firebase_app_distribution \
            flavor:"staging" \
            build_type:"release" \
            apk_path:"app-staging-release.apk" \
            groups:"qa"

