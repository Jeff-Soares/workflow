name: Shared - Build & publish XCFramework

on:
  push:
    tags:
      - 'shared-v*'

jobs:
  publish:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v7

      - name: Setup Android Environment
        uses: ./.github/actions/setup-android

      - name: Get release notes from source repo
        id: src_notes
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          notes=$(gh release view "${GITHUB_REF_NAME}" --json body --jq '.body')
          {
            echo "notes<<EOF"
            echo "$notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#shared-v}" >> "$GITHUB_OUTPUT"

      - name: Build XCFramework
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
        run: ./gradlew :shared:assembleMobileSharedReleaseXCFramework --no-daemon

      - name: Zip + checksum
        id: pkg
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            shared/build/XCFrameworks/release/MobileShared.xcframework \
            "$GITHUB_WORKSPACE/MobileShared.xcframework.zip"
          
          echo "checksum=$(swift package compute-checksum "$GITHUB_WORKSPACE/MobileShared.xcframework.zip")" >> "$GITHUB_OUTPUT"

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Upload XCFramework to S3
        run: |
          aws s3 cp "$GITHUB_WORKSPACE/MobileShared.xcframework.zip" \
            "s3://android-s3-tests/MobileShared-${{ steps.ver.outputs.version }}.xcframework.zip" \
            --acl public-read

      # --- Publicação no repositório mobile-shared ---
      - name: Checkout mobile-shared
        uses: actions/checkout@v7
        with:
          repository: Jeff-Soares/mobile-shared
          token: ${{ secrets.RELEASE_TOKEN }}
          path: mobile-shared

      - name: Generate Package.swift
        uses: ./.github/actions/generate-package-swift
        with:
          version: ${{ steps.ver.outputs.version }}
          checksum: ${{ steps.pkg.outputs.checksum }}
          output-path: mobile-shared/Package.swift

      - name: Commit, tag & release mobile-shared
        working-directory: mobile-shared
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
          NOTES: ${{ steps.src_notes.outputs.notes }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git commit -am "chore: release shared ${VERSION}"
          git push origin main

          gh release create "${VERSION}" \
            --repo Jeff-Soares/mobile-shared \
            --title "${VERSION}" \
            --notes "${NOTES:-MobileShared ${VERSION}}" \
            --latest
